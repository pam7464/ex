<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일예제1-5</title>
  <style>
    li:nth-child(6){
      color:red;
    }
    li:nth-child(12){
      color:green;
    }
    li:nth-child(1),li:nth-child(20){
      color:blue;
    }
    li:first-child,li:last-child{
      color:yellow;
    }
    li:nth-child(2n){
      color:cyan;
    }
    li:nth-child(2n+1){
      color:magenta;
    }
  </style>
</head>
<body>
  <ul>
    <li>1</li>
    <li>2</li>
    <li>3</li>
    <li>4</li>
    <li>5</li>
    <li>6</li>
    <li>7</li>
    <li>8</li>
    <li>9</li>
    <li>10</li>
    <li>11</li>
    <li>12</li>
    <li>13</li>
    <li>14</li>
    <li>15</li>
    <li>16</li>
    <li>17</li>
    <li>18</li>
    <li>19</li>
    <li>20</li>
    <li>21</li>
    <li>22</li>
  </ul>
  
</body>
</html>
