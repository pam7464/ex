<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>css속성1-2</title>
  <style>
    div{
      width:300px;
      height:300px;

      /* 여백/마진 */
      margin:20px;

      /* 테두리/보더 */
      /* 위쪽 테두리 */
      border-top-color:#ff0000;
      border-top-width:10px;
      border-top-style:double;

      /* 오른쪽 테두리 */
      border-right-color:#00ff00;
      border-right-width:6px;
      border-right-style:dotted;

      /* 아랫쪽 테두리 */
      border-bottom-color:#0000ff;
      border-bottom-width:10px;
      border-bottom-style:solid;

      /* 왼쪽 테두리 */
      border-left:#ffff00 6px dashed;


      border:#00ffff solid 5px;

      /* 박스 사이즈 :500*500 */
      width:500px;
      height:500px;
      /* 박스는 가로 가운데 맞춤 */
      margin-right:auto;
      margin-left:auto;      
      /* 박스는 2px의 검정색 실선 테두리를 주시오 */
      border:2px #000000 solid;

      /* 안쪽 여백(보더와 컨텐츠박스의 사이 여백) */
      padding-top:20px;
      padding-right:30px;
      padding-bottom:40px;
      padding-left:50px;

      padding:20px  50px;
    }
  </style>
</head>
<body>
  <div>BOX</div>
</body>
</html>
