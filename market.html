<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:sans-serif;
    }
    #wrap{
      width:600px;
      margin:0 auto;
    }
    #wrap>div{
      border:1px solid #cccccc;
      padding:20px;
    }
    #wrap>div:nth-child(1){
      height:400px;
      margin-bottom:6px;
      padding:230px 0 0 0;
      background:url(./images/apple.jpg) no-repeat center;
      background-size:cover;
    }
    #wrap>div:nth-child(1)>div{
      padding:10px 30px;
      background-color:rgba(0,0,0,0.2);
    }
    h1{
      margin-bottom:1em;
      font-size:40px;
      color:#ffffff;
      text-shadow:1px 1px 1px black;
    }
    p{
      color:gold;
      font-weight:600;
      font-size:14px;
      line-height:28px;
    }
    #wrap>div:nth-child(2){
      padding-top:6px;
      padding-bottom:6px;
      background-color:#000000;
    }
    h2{
      font-size:16px;
      color:#ffffff;
    }
    .content-box>h3{
      margin-bottom:1em;
      font-size:16px;
      color:red;
      text-align:center;
    }
    .content-box>p{
      font-size:20px;
      font-weight:700;
      color:#000000;
      text-align:center;
      line-height:40px;
    }
    strong{
      color:#0000ff;
    }
    #time{
      font-size:1em;
      color:#666666;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div>
      <div>
        <h1>가정용 꿀사과</h1>
        <p>
          흠집이 있지만 맛있는 꿀사과 사세요.
          <br>
          정말 정말 맛있는 꿀사과 사세요
        </p>
      </div>
    </div>

    <div>
      <h2>확인하세요</h2>
    </div>

    <div class="content-box">
      <h3>주문 및 배송</h3>
      <p>
        <strong>오후 2시 이전</strong> 주문건은 당일 발송합니다
        2시 이후 주문건은 다음날 발송합니다(주말 제외)
      </p>      
    </div>

    <div class="content-box">
      <h3>교환 및 환불</h3>
      <p>
        불만족시 <strong>100% 환불</strong>해 드립니다
        고객센터로 전화주세요
      </p> 
    </div>

    <div class="content-box">
      <h3>고객센터</h3>
      <p>0000-0000</p>
      <p id="time">상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)</p>
    </div>
  </div>
</body>
</html>
