<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>프론트엔드 개발자 지원서</title>
</head>
<body>
	<form action="#">
		<fieldset>
			<h1>프론트엔드 개발자 지원서</h1>
			<p>HTML, CSS, javaScript에 대한 기술적 경험과 능력이 되는 사원을 모집합니다. </p>
			<hr>
			<h3>개인정보</h3>
			<label for="name">이름</label>
			<input type="text" id="name" placeholder="공백없이 입력하세요">
			<br>
			<label for="phone">연락처</label>
			<input type="text" id="phone">
			<br>
			<h3>지원분야</h3>
			<input type="radio" name="web" id="web1">
			<label for="web1">웹 퍼블리싱</label>
			<br>
			<input type="radio" name="web" id="web2">
			<label for="web2">웹 애플리케이션 개발</label>
			<br>
			<input type="radio" name="web" id="web3">
			<label for="web3">웹 개발환경</label>
			<br>
			<h3>지원동기</h3>
			<textarea cols="100" rows="5" placeholder="하고 싶은말 있으면 쓰시던지..."></textarea>
			<br>
			<input type="submit" value="전송하기">
			<input type="reset" value="취소하기">
		</fieldset>
	</form>
</body>
</html>
