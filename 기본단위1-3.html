<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기본단위1-3</title>
  <style>
    .box{
      font-size:10px;
      width:100px;
      height:100px;
    }
    #box01{
      background-color:red;
    }
    #box02{
      background-color:green;
    }
    #box03{
      background-color:blue;
    }
    .sub-box{
      background-color:yellow;
    }
    #sub-box01{
      width:200px;
      height:70px;
    }
    #sub-box02{
      width:300%;
      height:50%;
    }
    #sub-box03{
      width:5em;
      height:5em;
    }
  </style>
</head>
<body>
  
  <div id="box01" class="box">
    <div id="sub-box01" class="sub-box"></div>
  </div>

  <div id="box02" class="box">
    <div id="sub-box02" class="sub-box"></div>
  </div>

  <div id="box03" class="box">
    <div id="sub-box03" class="sub-box"></div>
  </div>

</body>
</html>
