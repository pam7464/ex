<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타알예제1-4</title>
  <style>
    *{color:red;}
    #dinner li{
      color:green;
    }
    .food li{
      color:blue;
    }
  </style>
</head>
<body>
  <ul>
    <li class="food">
      아침
      <ul>
        <li>시리얼</li>
        <li>밥</li>
        <li>빵</li>
      </ul>
    </li>
    <li class="food">
      점심
      <ul>
        <li>도시락</li>
        <li>집밥</li>
        <li>식당밥</li>
        <li>학식</li>
      </ul>
    </li>
    <li id="dinner">
      저녁
      <ul>
        <li>집밥</li>
        <li>술</li>
        <li>고기</li>
        <li>라면</li>
        <li>족발</li>
        <li>피자</li>
      </ul>
    </li>
  </ul>
</body>
</html>
