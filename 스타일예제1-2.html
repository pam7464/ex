<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일예제1-2</title>
  <style>
    /* 모든선택자 */
    *{color:black;}

    /* 태그 선택자 */
    li{color:red;}

    /* 아이디 선택자 */
    #list03,#list06,#list09{
      color:green;
    }

    /* 클래스 선택자 */
    .cla{
      color:blue;
    }
  </style>
</head>
<body>
  <ul>
    <li id="list01">1번째 리스트</li>
    <li id="list02">2번째 리스트</li>
    <li id="list03">3번째 리스트</li>
    <li id="list04" class="cla">4번째 리스트</li>
    <li id="list05">5번째 리스트</li>
    <li id="list06">6번째 리스트</li>
    <li id="list07" class="cla">7번째 리스트</li>
    <li id="list08">8번째 리스트</li>
    <li id="list09">9번째 리스트</li>
    <li id="list10" class="cla">10번째 리스트</li>
  </ul>
</body>
</html>
