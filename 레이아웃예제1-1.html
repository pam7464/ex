<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레이아웃예제1-1</title>
  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding:0;
      font-family: sans-serif;
    }
    ul,ol,li{
      list-style:none;
    }
    a{
      color:#000000;
      text-decoration:none;
    }
    .clearfix::after{
      content:'';
      display:block;
      clear:both;
    }




    #wrap{
      width:960px;
      margin:0 auto;
    }
    header{
      margin-bottom:10px;
      border:5px solid black;
      padding:10px 50px;
    }
    section{
      margin-bottom:10px;      
    }
    article,aside,footer{
      border:5px solid black;
      padding:24px;
    }
    article{
      float:left;
      width:640px;
      margin-right:10px;
    }
    aside{
      float:left;
      width:310px;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <header>
      <h1>사이트제목</h1>
    </header>
    <section class="clearfix">
      <article>본문</article>
      <aside>사이드</aside>
    </section>
    <footer>
      <address>주소</address>
    </footer>
  </div>
</body>
</html>
