<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보너스</title>
  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding:0;
      font-family:sans-serif;
    }
    ul,ol,li{
      list-style:none;
    }
    ul{
      width:500px;
      margin:0 auto;
    }
    li{
      margin:20px 0;
      border:1px solid black;
      padding:20px;
      text-align:center;
    }
    li:nth-child(1){
      background-color:#ff0000;
    }
    li:nth-child(2){
      background-image:url(./images/summer01.jpg);
    }
    li:nth-child(3){
      background-image:linear-gradient(red,blue);
    }
    li:nth-child(4){
      background-image:linear-gradient(90deg,#ff0000,#0000ff);
    }
    li:nth-child(5){
      background-image:linear-gradient(135deg,red,green,blue);
    }
    li:nth-child(6){
      background-image:linear-gradient(90deg,rgba(255,0,0,0.5) 0%,#00ff00 30%,rgba(0,0,255,0.5) 100%);
    }
    li:nth-child(7){
      width:300px;
      height:300px;
      border:1px solid #111111;
      background-image:linear-gradient(135deg,rgba(255,255,0,0.8),rgba(0,255,255,0.2) 50%,#ff00ff);
    }
    li:nth-child(8){
      width:500px;
      height:500px;
      border-radius:50%;
      background-image:radial-gradient(red 10%,green,blue 80%);
    }
  </style>
</head>
<body>
  <ul>
    <li>그라디언트1</li>
    <li>그라디언트2</li>
    <li>그라디언트3</li>
    <li>그라디언트4</li>
    <li>그라디언트5</li>
    <li>그라디언트6</li>
    <li>그라디언트7</li>
    <li>그라디언트8</li>
    <li>그라디언트9</li>
    <li>그라디언트10</li>
  </ul>
</body>
</html>
