<!DOCTYPE html>
<html lang="ko">
<head>

  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보너스</title>
  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding:0;
      font-family:sans-serif;
    }
    ul,ol,li{
      list-style:none;
    }
    ul{
      width:500px;
      margin:0 auto;
    }
    li{
      margin:20px 0;
      border:1px solid black;
      padding:20px;
      text-align:center;
    }
  </style>
</head>
<body>
  <ul>

    <li>그라디언트5</li>
    <li>그라디언트6</li>
    <li>그라디언트7</li>
    <li>그라디언트8</li>
    <li>그라디언트9</li>
    <li>그라디언트10</li>
  </ul>
</body>
</html>
