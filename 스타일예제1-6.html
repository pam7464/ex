<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일예제1-6</title>
  <style>
    div>p:nth-of-type(2){
      color:red;
    }
    div>p:first-of-type{
      color:green;
    }
    div>p:last-of-type{
      color:blue;
    }
  </style>
</head>
<body>
  <div>
    <h1>큰제목</h1>
    <p>큰제목의 내용</p>
    <h2>작은제목</h2>
    <p>작은제목의 내용1</p>
    <p>작은제목의 내용2</p>
    <h3>더작은 제목</h3>
    <p>더작은 제목의 내용</p>
  </div>
</body>
</html>
