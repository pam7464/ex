<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레이아웃예제2-3</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:sans-serif;
    }
    ul,ol,li{
      list-style:none;
    }
    a{
      color:#000000;
      text-decoration:none;
    }
    .clearfix::after{
      content:'';
      display:block;
      clear:both;
    }

    .box{
      width:100px;
      height:100px;
      position:fixed;
    }
    #box01{
      background-color:red;
      left:300px;
      top:200px;
    }
    #box02{
      background-color:green;
      left:350px;
      top:250px;
    }
    #box03{
      background-color:blue;
      left:400px;
      top:300px;
    }
  </style>
</head>
<body>
  <div class="box" id="box01">박스1</div>
  <div class="box" id="box02">박스2</div>
  <div class="box" id="box03">박스3</div>
</body>
</html>
