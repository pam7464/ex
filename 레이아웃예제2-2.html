<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레이아웃예제2-2</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:sans-serif;
    }
    ul,ol,li{
      list-style:none;
    }
    a{
      color:#000000;
      text-decoration:none;
    }
    .clearfix::after{
      content:'';
      display:block;
      clear:both;
    }
    .box{
      position:fixed;
      left:50px;
      right:50px;
      top:100px;
      bottom:0;
      background-color:red;
    }
  </style>
</head>
<body>
  <div class="box">박스1</div>
</body>
</html>
