<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시안디자인</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
    *{
      box-sizing: border-box;
      margin: 0;
      padding:0;
      font-family: sans-serif;
    }
    ul,ol,li{
      list-style:none;
    }
    a{
      color:#000000;
      text-decoration:none;
    }
    .clearfix::after{
      content:'';
      display:block;
      clear:both;
    }

    #wrap{
      width:360px;
      margin:0 auto;
    }
    header{
      height:100px;
      background-color:#b5121b;
    }
    #main-logo{
      float:left;
      width:270px;
      height:100px;
      /* font-family:Roboto,sans-serif; */
      /* font-weight:900; */
      /* font-size:48px; */
      /* color:#ffffff; */
      text-align:center;
      line-height:100px;
    }
    #main-logo>a{
      font-family:Roboto,sans-serif;
      font-weight:900;
      font-size:48px;
      color:#ffffff;
    }
    #btn-ham{
      float:right;
      width:90px;
      height:100px;
      padding:33px 28px;
      position:relative;
    }
    #btn-ham::after{
      content:'';
      display:block;
      width:34px;
      height:34px;      
      position:absolute;
      left:28px;
      top:33px;
      cursor:pointer;
    }
    .line{
      width:34px;
      height:6px;
      background-color:#ffffff;
      border-radius:3px;
      text-indent:-5000px;
    }
    #line02{
      margin:8px 0;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <header>
      <h1 id="main-logo">
        <a href="#">HOLLYS</a>        
      </h1>
      <ul id="btn-ham">
        <li class="line" id="line01">햄버거버튼</li>
        <li class="line" id="line02">햄버거버튼</li>
        <li class="line" id="line03">햄버거버튼</li>
      </ul>
    </header>
  </div>
</body>
</html>
