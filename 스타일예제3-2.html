<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일예제3-2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap');
    *{
      box-sizing: border-box;
      margin:0;
      padding:0;
      font-family:Roboto,'Noto Sans KR',snas-serif;
    }
    p:nth-of-type(1){
      font-weight:900;
    }
    p:nth-of-type(2){
      font-weight:100;
    }
    span{
      font-family:Roboto;
      font-weight:500;
      font-size:72px;
    }
  </style>
</head>
<body>
  <h1>CSS 웹 폰트</h1>
  <p>
    Lorem ipsum dolor, sit amet consectetur adipisicing elit. At rerum amet iusto labore maxime delectus incidunt, temporibus perferendis quae id reprehenderit quaerat fugit voluptate aliquid. Ex ab quasi eaque corrupti!
  </p>
  <p>
    학교종이 땡땡땡 어서 모이자
    <br>
    선생님이 우리들 기다리신다.
  </p>
  <span>lorem</span>
</body>
</html>
