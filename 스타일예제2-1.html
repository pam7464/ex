<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일예제2-1</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }
    ul{
      margin:20px;
      border:1px solid black;
      padding:20px;
    }
    #list01{
      border-color:red;
    }
    #list02{
      border-color:green;
    }
    #list03{
      border-color:blue;
    }
    #list04{
      border-color:cyan;
    }
    li{
      margin:10px;
      border:1px solid black;
      padding:10px;
    }
    #list01>li{
      display:inline;
      /* 인라인 박스의 크기를 조절 할 수 없다 */
      width:1000px;
    }
    #list02>li{
      display:block;
      width:200px;
    }
    #list03>li{
      display:inline-block;
      width:200px;
    }
    #list04>li{
      display:none;
    }

    #list01>li:nth-child(2),
    #list02>li:nth-child(2),
    #list03>li:nth-child(2){
      display:none;
    }
  </style>
</head>
<body>
  <ul id="list01">
    <li>1-1</li>
    <li>1-2</li>
    <li>1-3</li>
    <li>1-4</li>
    <li>1-5</li>
  </ul>
  <ul id="list02">
    <li>2-1</li>
    <li>2-2</li>
    <li>2-3</li>
    <li>2-4</li>
    <li>2-5</li>
  </ul>
  <ul id="list03">
    <li>3-1</li>
    <li>3-2</li>
    <li>3-3</li>
    <li>3-4</li>
    <li>3-5</li>
  </ul>
  <ul id="list04">
    <li>4-1</li>
    <li>4-2</li>
    <li>4-3</li>
    <li>4-4</li>
    <li>4-5</li>
  </ul>

</body>
</html>
