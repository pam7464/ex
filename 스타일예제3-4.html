<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스타일예제3-4</title>
  <style>
    *{
      box-sizing: border-box;
      margin:0;
      padding:0;
      font-family: sans-serif;
    }
    body{
      font-size:10px;
    }
    body>.normal{
      font-style:normal;
      font-weight:900;
      font-size:20px;
    }
    body>.italic{
      font-style:italic;
      font-weight:100;
      font-size:2em;
    }
    #list-box{
      font-size:10px;
    }
    ul,li{
      font-size:1.2em;
    }
    #list-box>li:first-child>ul>li:first-child{
      font-size:17.28px;
    }
  </style>
</head>
<body>
  <p class="normal">이것은 기본 스타일입니다</p>
  <p class="italic">이것은 기울임꼴 스타일입니다</p>
  <ul id="list-box">
    <li>
      <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
      </ul>
    </li>
    <li>
      <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
      </ul>
    </li>
    <li>
      <ul>
        <li>1</li>
        <li>2</li>
        <li><h1>제목</h1></li>
      </ul>
    </li>
  </ul>  
  <h1>제목</h1>
</body>
</html>
