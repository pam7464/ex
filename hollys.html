<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollys</title>
  <style>

    /* CSS Reset */
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap');
    *{
      box-sizing: border-box;
      margin:0;
      padding:0;
      font-family:'Roboto','Noto Sans KR',sans-serif;
    }
    ul,ol,li{
      list-style: none;
    }
    a{
      text-decoration: none;
      color:#000000;
    }
    img{
      width:100%;
      vertical-align:top;
    }
    .clearfix::after{
      content:'';
      display:block;
      clear:both;
    }

    /* ==================================== */


    #wrap{
      width:336px;
      margin:0 auto;      
    }

    /* header 스타일 */
    header{
      height:100px;
      background-color:#b5121b;
      position:relative;
    }
    #main-logo{
      width:246px;
      height:100px;
      font-weight:900;
      font-size:48px;      
      text-align:center;
      line-height:100px;
    }
    #main-logo>a{
      color:#ffffff;
    }
    #btn-menu{
      width:34px;
      height:34px;
      position:absolute;
      right:16px;
      top:33px;
      cursor:pointer;
    }
    #btn-menu::before,#btn-menu::after{
      content:'';
      display:block;
      width:34px;
      height:6px;
      border-radius:3px;
      background-color:#ffffff;
    }
    #btn-menu>.line{
      width:34px;
      height:6px;
      margin:8px 0;
      border-radius:3px;
      background-color:#ffffff; 
      text-indent:-999999px;     
    }


    /* main-banner 스타일 */




    /* quick-menu 스타일 */




    /* sub-banner 스타일 */




    /* footer 스타일 */






  </style>
</head>
<body>
  <div id="wrap">
    <header>
      <h1 id="main-logo">
        <a href="./hollys.html">HOLLYS</a>
      </h1>
      <div id="btn-menu">
        <div class="line">메뉴버튼</div>
      </div>
    </header>
    <section id="main-banner">
      <div id="banner-img">
        <a href="#">
          <img src="./images/main-banner.jpg" alt="매인배너">
        </a>
      </div>
    </section>
    <section id="quick-menu">
      <ul>
        <li id="menu01">
          <a href="#">
            <div class="menu-img">
              <img src="./images/main_menu01.gif" alt="매인매뉴1">
            </div>
            <p>Shoping</p>
          </a>
        </li>
        <li id="menu02">
          <a href="#">
            <div class="menu-img">
              <img src="./images/main_menu02.gif" alt="매인매뉴">
            </div>
            <p>Order</p>
          </a>
        </li>
        <li id="menu03">
          <a href="#">
            <div class="menu-img">
              <img src="./images/main_menu03.gif" alt="매인매뉴3">
            </div>
            <p>Shop</p>
          </a>
        </li>
        <li id="menu04">
          <a href="#">
            <div class="menu-img">
              <img src="./images/main_menu04.gif" alt="매인매뉴4">
            </div>
            <p>Gift</p>
          </a>
        </li>
      </ul>
    </section>
    <section id="sub-banner">
      <ul>
        <li id="sub-banner01">
          <a href="#">
            <img src="./images/sub-banner01.jpg" alt="서브배너1">
          </a>
        </li>
        <li id="sub-banner02">
          <a href="#">
            <img src="./images/sub-banner02.jpg" alt="서브배너2">
          </a>
        </li>
        <li id="sub-banner03">
          <a href="#">
            <img src="./images/sub-banner03.jpg" alt="서브배너3">
          </a>
        </li>
      </ul>
    </section>
    <footer>
      <p><strong>주식회사 할리스커피</strong></p>
      <address>
        주소:서울특별시 종로구 종로동11-1   일일빌딩 11층 11호
        <br>
        대표전화:02-111-1111     FAX:02-111-1112
        <br>
        COPYRIGHT 할리스커피
      </address>
    </footer>
  </div>
</body>
</html>
