<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블록과 인라인</title>
</head>
<body>
  <!-- 용도 - 가장 상위 제목 -->
  <!-- 구조 - 블록구조 -->
  <h1>대한민국</h1>

  <!-- 용도 - 문단 -->
  <!-- 구조 - 블록구조 -->
  <p>
    Lorem ipsum dolor sit amet consectetur adipisicing elit. Officia, expedita enim recusandae magnam cum soluta saepe in voluptatum aspernatur maxime laboriosam culpa explicabo voluptatem ullam? Molestias suscipit molestiae ipsa nulla?
  </p>

  <!-- 용도 - 텍스트를 입력 -->
  <!-- 구조 - 인라인구조 -->
  <input type="text">

  <!-- 용도 - X -->
  <!-- 구조 - 블록구조 -->
  <div>박스1</div>
  <div>박스2</div>
  
  <!-- 용도 - X -->
  <!-- 구조 - 인라인구조 -->
  <span>box1</span>
  <span>box2</span>
</body>
</html>
